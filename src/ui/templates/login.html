<div class="card login-card">
  <h1>{{t.login_title}}</h1>
  {{#error}}
  <div class="error">{{error}}</div>
  {{/error}}
  <form method="POST" action="/login">
    {{#returnTo}}<input type="hidden" name="return_to" value="{{returnTo}}">{{/returnTo}}
    <div class="form-group">
      <label for="password">{{t.login_password}}</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required autofocus>
    </div>
    <button type="submit" class="btn">{{t.login_sign_in}}</button>
  </form>
  <div id="passkey-login" class="mt-1">
    <button type="button" class="btn btn-secondary hidden" onclick="passkeyLogin()" id="passkey-btn">{{t.login_passkey}}</button>
  </div>
  <script src="/scripts/webauthn-utils.js"></script>
  <script src="/scripts/passkey-login.js"></script>
</div>
