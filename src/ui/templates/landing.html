<div class="landing">
  <div class="landing-header">
    <h1>{{siteName}}</h1>
    <p class="text-muted">{{t.land_tagline}}</p>
  </div>

  <div class="landing-cards">
    <div class="card login-card">
      <h2>{{t.land_sign_in}}</h2>
      <form method="POST" action="/login">
        <div class="form-group">
          <label for="username">{{t.land_username}}</label>
          <input type="text" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">{{t.land_password}}</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn">{{t.land_sign_in}}</button>
      </form>
      <div id="passkey-login" class="mt-1">
        <button type="button" class="btn btn-secondary hidden" onclick="passkeyLogin()" id="passkey-btn">{{t.land_passkey}}</button>
      </div>
      <div id="fedcm-login" class="mt-1">
        <button type="button" class="btn btn-secondary hidden" onclick="fedcmLogin()" id="fedcm-btn">{{t.land_fedcm}}</button>
      </div>
      {{#hasExternalIdps}}
      <div class="mt-1">
        <p class="text-muted text-sm">{{t.land_or_sign_in_with}}</p>
        {{#externalIdps}}
        <button type="button" class="btn btn-secondary mt-025"
          onclick="fedcmExternalLogin('{{configURL}}', '{{clientId}}', '{{id}}')">
          {{name}}
        </button>
        {{/externalIdps}}
      </div>
      {{/hasExternalIdps}}
      <script src="/scripts/webauthn-utils.js"></script>
      <script src="/scripts/passkey-login.js"></script>
      <script src="/scripts/fedcm-login.js"></script>
    </div>

    {{#registrationOpen}}
    <div class="card login-card">
      <h2>{{t.land_create_account}}</h2>
      <form method="POST" action="/signup">
        <div class="form-group">
          <label for="signup-username">{{t.land_username}}</label>
          <input type="text" id="signup-username" name="username" pattern="[a-zA-Z0-9_\-]+" title="{{t.land_username_pattern}}" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="signup-password">{{t.land_password}}</label>
          <input type="password" id="signup-password" name="password" minlength="8" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label for="confirm_password">{{t.land_confirm_password}}</label>
          <input type="password" id="confirm_password" name="confirm_password" minlength="8" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn">{{t.land_create_account}}</button>
      </form>
    </div>
    {{/registrationOpen}}
  </div>
</div>
